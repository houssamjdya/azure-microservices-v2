apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: acrmicroservicesv2.azurecr.io/product-service:latest
        ports:
        - containerPort: 5000
        env:  
        - name: PORT
          value: "5000"
        - name: USER_SERVICE_URL
          value: "http://user-service:5000"
        livenessProbe:
          httpGet:  
            path: /health
            port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
        readinessProbe:
          httpGet:  
            path: /health
            port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          